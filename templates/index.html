<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ΜΑΧΙ-ΒΟΤ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1b8f7b; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 600px; height: 80vh; background: white; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .chat-header { background: #5ce7a1; color: white; padding: 20px; text-align: center; font-size: 18px; font-weight: bold; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
        .user-message { background: #5ce7a1; color: white; align-self: flex-end; border-radius: 12px 12px 0 12px; }
        .ai-message { background: #f0f2f5; color: #1a1a1a; align-self: flex-start; border-radius: 12px 12px 12px 0; }
        .chat-input { display: flex; padding: 16px; gap: 10px; border-top: 1px solid #e5e7eb; }
        .chat-input input { flex: 1; padding: 12px 16px; border: 1px solid #e5e7eb; border-radius: 24px; outline: none; font-size: 14px; }
        .chat-input button { background: #5ce7a1; color: white; border: none; padding: 12px 20px; border-radius: 24px; cursor: pointer; font-size: 14px; }
        .chat-input input:focus { border-color: #5ce7a1; }
        .chat-input button { background: #5ce7a1; color: white; border: none; padding: 12px 20px; border-radius: 24px; cursor: pointer; font-size: 14px; }
        .chat-input button:hover { background: #5ce7a1; }
        .typing { color: #9ca3af; font-style: italic; font-size: 13px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">ΜΑΧΙ-ΒΟΤ</div>
        <div class="chat-messages" id="messages">
            <div class="message ai-message">Γεια σου! Πώς μπορώ να σε βοηθήσω;</div>
        </div>
        <div class="chat-input">
            <input type="text" id="input" placeholder="Γράψε μήνυμα..." />
            <button onclick="sendMessage()">Στείλε</button>
        </div>
    </div>

    <script>
        document.getElementById("input").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });

        async function sendMessage() {
            const input = document.getElementById("input");
            const messages = document.getElementById("messages");
            const text = input.value.trim();
            if (!text) return;

            input.value = "";

            const userDiv = document.createElement("div");
            userDiv.className = "message user-message";
            userDiv.textContent = text;
            messages.appendChild(userDiv);

            const typingDiv = document.createElement("div");
            typingDiv.className = "message ai-message typing";
            typingDiv.textContent = "Γράφει...";
            messages.appendChild(typingDiv);
            messages.scrollTop = messages.scrollHeight;

            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();
            typingDiv.className = "message ai-message";
            typingDiv.textContent = data.response;
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
